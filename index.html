<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>節奏航海記</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-color: #00838f;
    --accent-color: #00b4db;
    --glass-bg: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(255, 255, 255, 0.6);
    --glass-shadow: 0 25px 50px rgba(0, 96, 100, 0.15);
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    margin: 0;
    padding: 0;
    color: #2c3e50;
    overflow: hidden;
    background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
  }

  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  /* 💎 升級版毛玻璃面板 */
  .screen {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 950px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 40px 50px;
    border-radius: 32px;
    border: 1px solid var(--glass-border);
    border-top: 2px solid rgba(255, 255, 255, 0.9);
    border-left: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow: var(--glass-shadow);
    z-index: 10;
    text-align: center;
    transition: opacity 0.5s ease;
  }
  .screen.active { 
    display: block; 
    animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1);
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: translate(-50%, -45%) scale(0.95); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* 🎬 遊戲首頁 (Intro Screen) - 專屬全螢幕圖檔設定 */
  #intro-screen.screen {
    top: 0; left: 0;
    transform: none; /* 覆蓋置中的 transform */
    width: 100vw;
    height: 100vh;
    max-width: none;
    border-radius: 0;
    border: none;
    padding: 0;
    background: url('航向.jpg') center center / cover no-repeat;
    background-color: #87CEEB; /* 備用底色 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50; /* 確保封面在最上層 */
  }
  #intro-screen.screen:not(.active) {
    display: none;
  }

  .btn-start {
    background: rgba(212, 163, 115, 0.85); /* 半透明的木質感色彩 */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-size: 42px;
    font-weight: 900;
    padding: 20px 70px;
    border-radius: 50px;
    border: 4px solid rgba(92, 58, 33, 0.8);
    box-shadow: 0 10px 0 rgba(92, 58, 33, 0.8), 0 20px 30px rgba(0,0,0,0.4), inset 0 5px 10px rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 3px;
    font-family: 'Nunito', sans-serif;
    text-shadow: 0 3px 5px rgba(0,0,0,0.5);
    margin-top: 15vh; /* 將按鈕稍微往下壓，配合圖檔構圖 */
  }
  .btn-start:active {
    transform: translateY(10px);
    box-shadow: 0 0px 0 rgba(92, 58, 33, 0.8), 0 10px 15px rgba(0,0,0,0.4), inset 0 5px 10px rgba(255,255,255,0.3);
  }

  /* 📱 右下角社群連結 */
  .social-links {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 100;
  }
  .social-link {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: white;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    background: rgba(0, 0, 0, 0.4);
    padding: 8px 16px 8px 8px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .social-link:hover {
    transform: scale(1.05) translateX(-5px);
    background: rgba(0, 0, 0, 0.6);
  }
  .social-icon {
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .icon-threads { background: #000; color: white; border: 2px solid #fff; }
  .icon-yt { background: #FF0000; color: white; border: 2px solid #fff; }
  .social-icon svg { width: 24px; height: 24px; fill: currentColor; }

  /* 標題與其他現有樣式 */
  h2 {
    font-size: 36px;
    font-weight: 900;
    color: #006064;
    margin-top: 0;
    margin-bottom: 30px;
    letter-spacing: 2px;
    text-shadow: 0 2px 4px rgba(255,255,255,0.9);
  }

  /* 🎮 遊戲畫面：全螢幕無邊框覆蓋 */
  #game-screen.active {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    top: 0; left: 0;
    transform: none;
    width: 100vw; height: 100vh;
    max-width: none;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    box-shadow: none;
    padding: 40px 50px; 
    pointer-events: none;
    animation: fadeIn 0.5s ease;
  }
  #game-screen.active > * {
    pointer-events: auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* 🎵 遊戲化音符按鈕 */
  .note-btns-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
    width: 100%;
  }

  .note-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 85px;
    height: 85px;
    cursor: pointer;
    border: none;
    background: linear-gradient(180deg, #ffffff 0%, #e0f7fa 100%);
    border-radius: 20px;
    color: var(--primary-color);
    box-shadow: 0 6px 0 #80deea, 0 10px 15px rgba(0, 188, 212, 0.2);
    transition: all 0.1s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .note-btn .icon { font-size: 32px; font-weight: 900; line-height: 1; margin-bottom: 5px; }
  .note-btn .label { font-size: 14px; font-weight: 700; opacity: 0.8; }
  
  .note-btn:hover { 
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #80deea, 0 15px 20px rgba(0, 188, 212, 0.3);
  }
  .note-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0 #80deea, 0 2px 5px rgba(0, 188, 212, 0.2);
  }

  /* 🖥️ 當前節奏顯示器 */
  #current-pattern {
    font-size: 48px;
    color: #006064;
    margin: 20px 0;
    min-height: 90px;
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed #4dd0e1;
    box-shadow: inset 0 4px 15px rgba(0,0,0,0.05);
    width: 100%;
    letter-spacing: 8px;
  }

  /* 📋 關卡清單 */
  .level-list { 
    text-align: left; 
    margin-bottom: 25px; 
    list-style: none; 
    padding: 0; 
    max-height: 250px; 
    overflow-y: auto; 
    padding-right: 10px;
  }
  .level-list::-webkit-scrollbar { width: 8px; }
  .level-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 4px; }
  .level-list::-webkit-scrollbar-thumb { background: rgba(0,188,212,0.4); border-radius: 4px; }
  
  .level-list li {
    background: #ffffff;
    margin: 12px 0;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,188,212,0.08);
    border: 1px solid #e0f7fa;
    color: #333;
    transition: transform 0.2s ease;
  }
  .level-list li:hover { transform: translateX(5px); }

  /* 🚀 動作按鈕優化 */
  .action-btn {
    font-size: 18px;
    padding: 14px 24px;
    font-weight: 900;
    color: white;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-purple { background: linear-gradient(135deg, #ab47bc, #7e57c2); box-shadow: 0 6px 15px rgba(126, 87, 194, 0.3); }
  .btn-gray { background: linear-gradient(135deg, #b0bec5, #90a4ae); box-shadow: 0 6px 15px rgba(144, 164, 174, 0.3); }
  .btn-green { background: linear-gradient(135deg, #00b4db, #0083b0); box-shadow: 0 6px 15px rgba(0, 180, 219, 0.3); }
  .btn-blue { background: linear-gradient(135deg, #2193b0, #6dd5ed); box-shadow: 0 8px 20px rgba(33, 147, 176, 0.4); }
  .btn-orange { background: linear-gradient(135deg, #ff9966, #ff5e62); box-shadow: 0 8px 20px rgba(255, 94, 98, 0.4); }
  .btn-red { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 6px 15px rgba(255, 65, 108, 0.3); }

  .action-btn:hover:not(:disabled) { 
    transform: translateY(-3px) scale(1.02); 
    filter: brightness(1.1);
  }
  .action-btn:active:not(:disabled) {
    transform: translateY(1px);
  }
  .action-btn:disabled { 
    background: #cfd8dc; 
    box-shadow: none; 
    cursor: not-allowed; 
    transform: none; 
    color: #90a4ae;
  }

  /* 🎯 遊戲中 UI 元素 */
  .game-header {
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    width: 100%;
  }
  .game-title {
    margin: 0; 
    color: #ffffff; 
    font-size: 42px;
    text-shadow: 0 4px 15px rgba(0, 96, 100, 0.8), 0 2px 4px rgba(0,0,0,0.4);
  }
  .game-title span {
    display: block;
    font-size: 20px;
    margin-top: 5px;
    opacity: 0.9;
    text-shadow: none;
  }
  
  #treasure-count {
    font-size: 32px;
    color: #fff;
    font-weight: 900;
    background: linear-gradient(135deg, #ffb75e, #ed8f03);
    padding: 12px 30px;
    border-radius: 40px;
    border: 3px solid #fff;
    box-shadow: 0 8px 25px rgba(237, 143, 3, 0.4);
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  #rhythm-display {
    font-size: clamp(50px, 8vw, 100px);
    color: #004d40;
    font-weight: 900;
    letter-spacing: clamp(10px, 3vw, 25px);
    text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.8);
    background: rgba(255, 255, 255, 0.85);
    padding: 30px 80px;
    border-radius: 40px;
    border: 4px solid #80deea;
    box-shadow: 0 15px 35px rgba(0, 150, 136, 0.2), inset 0 0 20px rgba(255,255,255,1);
  }

  /* 🎛️ 音效控制列 */
  .audio-controls {
    position: fixed;
    bottom: 30px;
    left: 30px; /* 移至左下角，不擋住社群連結 */
    z-index: 100;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    padding: 15px 25px;
    border-radius: 40px;
    box-shadow: 0 10px 30px rgba(0,188,212,0.2);
    display: flex;
    align-items: center;
    gap: 15px;
    font-weight: 700;
    border: 1px solid var(--glass-border);
  }
  .audio-controls label { cursor: pointer; user-select: none; color: #006064; display: flex; align-items: center; gap: 5px;}
  input[type="range"] { accent-color: #00b4db; cursor: pointer; }

  /* 🛠️ 設定中心布局 */
  .setup-grid-container {
    display: grid;
    gap: 50px; 
    grid-template-columns: 1fr; 
    align-items: start; 
    text-align: left; 
  }
  .setup-col {
    display: flex;
    flex-direction: column;
    width: 100%;
    background: rgba(255,255,255,0.4);
    padding: 30px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.8);
  }

  .setup-instruct {
    color: #00838f; 
    font-size: 18px; 
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 15px;
    text-align: center; 
  }

  .current-actions {
    display: flex;
    justify-content: center; 
    gap: 15px; 
    width: 100%;
  }
  .current-actions button { flex: 1; }

  .management-header {
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 20px;
    width: 100%;
    padding-bottom: 15px;
    border-bottom: 2px dashed rgba(0,188,212,0.3);
  }
  .management-header h3 { margin: 0; color: #006064; font-size: 22px; }

  @media (min-width: 1024px) { 
    .setup-grid-container { grid-template-columns: 1fr 1fr; }
    .level-list { max-height: 400px; }
  }

  /* 結束畫面特調 */
  #end-screen h2 { font-size: 48px; text-shadow: 0 4px 15px rgba(255, 111, 0, 0.3); margin-bottom: 10px;}
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="intro-screen" class="screen active">
  <button class="btn-start" onclick="enterSetup()">🐚 START 🐚</button>

  <div class="social-links">
    <a href="https://www.threads.com/@lycbert" target="_blank" class="social-link">
      <div class="social-icon icon-threads">
        <svg viewBox="0 0 24 24"><path d="M14.2 12.3c-.2.8-.8 1.4-1.6 1.6-1 .3-2.1-.1-2.5-1-.4-.9 0-2.1 1-2.5 1-.3 2.1.1 2.5 1m2.3-3.1c-.8-1.5-2.2-2.5-4-2.5-2.5 0-4.6 2.1-4.6 4.6 0 2.5 2.1 4.6 4.6 4.6 1.4 0 2.6-.6 3.4-1.6.4-.5.5-1.1.4-1.7l-1.3.3c.1.3 0 .7-.2 1-.5.7-1.4 1.1-2.3 1.1-1.8 0-3.3-1.5-3.3-3.3 0-1.8 1.5-3.3 3.3-3.3 1.3 0 2.4.8 2.9 2 .2.5.2 1 0 1.5l1.3-.3c.2-.6.2-1.3-.1-1.9M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/></svg>
      </div>
      <span>@lycbert</span>
    </a>
    <a href="https://www.youtube.com/@datoemusic" target="_blank" class="social-link">
      <div class="social-icon icon-yt">
        <svg viewBox="0 0 24 24"><path d="M21.582 6.186a2.76 2.76 0 0 0-1.942-1.946C17.925 3.8 12 3.8 12 3.8s-5.925 0-7.64.44a2.76 2.76 0 0 0-1.942 1.946C2 7.925 2 12 2 12s0 4.075.418 5.814a2.76 2.76 0 0 0 1.942 1.946C6.075 20.2 12 20.2 12 20.2s5.925 0 7.64-.44a2.76 2.76 0 0 0 1.942-1.946C22 16.075 22 12 22 12s0-4.075-.418-5.814M9.996 15.594V8.406L15.808 12l-5.812 3.594"/></svg>
      </div>
      <span>@datoemusic</span>
    </a>
  </div>
</div>

<div id="setup-screen" class="screen">
  <h2>🛠️ 節奏海洋 - 設定大廳</h2>
  
  <div class="setup-grid-container">
    <div class="setup-col setup-col-creation">
      <button class="action-btn btn-purple" style="width: 100%; font-size: 20px; padding: 20px;" onclick="generateRandomLevels()">🎲 隨機產生 10 題 </button>

      <div class="setup-instruct">🔽 手動組合區：點擊下方音符組合節奏 🔽</div>

      <div class="note-btns-container">
        <button class="note-btn" onclick="addNote('♩')">
          <div class="icon">♩</div><div class="label">四分</div>
        </button>
        <button class="note-btn" onclick="addNote('♫')">
          <div class="icon">♫</div><div class="label">八分</div>
        </button>
        <button class="note-btn" onclick="addNote('𝄽')">
          <div class="icon">𝄽</div><div class="label">休止</div>
        </button>
        <button class="note-btn" onclick="addNote('|')">
          <div class="icon">|</div><div class="label">小節線</div>
        </button>
      </div>

      <div id="current-pattern"></div>

      <div class="current-actions">
        <button class="action-btn btn-gray" onclick="clearPattern()">🧹 清除重拼</button>
        <button class="action-btn btn-green" onclick="addLevel()">✅ 加入關卡</button>
      </div>
    </div> 

    <div class="setup-col setup-col-management">
      <div class="management-header">
        <h3>已建立關卡 (<span id="level-count">0</span>)</h3>
        <button class="action-btn btn-red" style="padding: 8px 16px; font-size: 14px;" onclick="clearAllLevels()">🗑️ 清空</button>
      </div>
      
      <ul id="levels" class="level-list"></ul>
      
      <button class="action-btn btn-blue" style="width:100%; font-size:24px; padding: 20px; margin-top: auto;" onclick="startGame()">⛵ 開始陽光航行</button>
    </div> 
  </div> 
</div>

<div id="game-screen" class="screen">
  <div class="game-header">
    <h2 class="game-title">🌊 節奏航海記 <span id="game-progress"></span></h2>
    <div id="treasure-count">💎 0</div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <div id="rhythm-display"></div>
  </div>

  <div style="text-align:center; padding-bottom: 20px; display: flex; justify-content: center; gap: 30px;">
    <button id="wrong-btn" class="action-btn btn-red" style="font-size: 28px; padding: 20px 50px; border-radius: 50px;" onclick="performWrong()">❌ 演奏錯誤</button>
    <button id="next-btn" class="action-btn btn-orange" style="font-size: 28px; padding: 20px 50px; border-radius: 50px;" onclick="performCorrect()">🎵 演奏正確</button>
  </div>
</div>

<div id="end-screen" class="screen">
  <h2 style="color: #ff6f00;">🎉 傳奇航海家誕生！ 🎉</h2>
  <p id="final-treasures" style="font-size: 70px; margin: 30px 0; text-shadow: 0 10px 20px rgba(255,152,0,0.3); word-break: break-all;">💎 💎 💎</p>
  <p style="font-size: 24px; color: #006064; font-weight: 700;">恭喜全班完美演繹所有節奏，找回了海域上所有的寶藏！</p>
  <button class="action-btn btn-blue" style="font-size: 22px; padding: 18px 50px; margin-top: 40px; border-radius: 40px;" onclick="location.reload()">🔄 回到首頁</button>
</div>

<div class="audio-controls" id="audio-controls">
  <span>🔊</span>
  <input type="range" id="volume-slider" min="0" max="100" value="70" oninput="setVolume(this.value)">
  <label><input type="checkbox" id="bgm-toggle" checked onchange="toggleBGM(this.checked)"> 環境音</label>
</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

  let currentNotes = "";
  let gameLevels = [];
  let currentLevelIndex = 0;
  let treasures = 0;

  const notePool = ['♩', '♫', '𝄽'];

  // 3D 變數與動畫狀態
  let scene, camera, renderer;
  let ocean, shipGroup, islandGroup, treasure, ambientLight, sunLight;
  let shipTargetX = -7;
  const shipSpeed = 0.12; 
  let isSinking = false; 
  let leavesMat; 
  const islandColors = [0x4caf50, 0xff8a65, 0xba68c8, 0xf48fb1, 0xffd54f];

  // ========================
  // 音效系統
  // ========================
  let audioCtx = null;
  let masterGain = null;
  let bgmOscillators = [];
  let isBGMPlaying = false;
  let globalVolume = 0.7;

  function initAudio() {
    if (audioCtx) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = globalVolume;
    masterGain.connect(audioCtx.destination);
  }

  window.setVolume = function(val) {
    globalVolume = val / 100;
    if (masterGain) masterGain.gain.value = globalVolume;
  };

  function playTone(freq, duration, type = 'sine', volume = 0.3, slideTo = null) {
    if (!audioCtx) initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) {
      osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
    }
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playDrum(freq, duration, noise = false) {
    if (!audioCtx) initAudio();
    if (noise) {
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noiseSrc = audioCtx.createBufferSource();
      noiseSrc.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = freq;
      noiseSrc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      noiseSrc.start();
    } else {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
  }

  function playChord(frequencies, duration, type = 'triangle') {
    frequencies.forEach((f, i) => {
      setTimeout(() => playTone(f, duration, type, 0.2), i * 60);
    });
  }

  function startOceanBGM() {
    if (!audioCtx) initAudio();
    if (isBGMPlaying) return;
    isBGMPlaying = true;
    const oceanOsc = audioCtx.createOscillator();
    const oceanGain = audioCtx.createGain();
    oceanOsc.type = 'sine';
    oceanOsc.frequency.value = 60;
    oceanGain.gain.value = 0.08;
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.2;
    lfoGain.gain.value = 0.04;
    lfo.connect(lfoGain);
    lfoGain.connect(oceanGain.gain);
    oceanOsc.connect(oceanGain);
    oceanGain.connect(masterGain);
    oceanOsc.start();
    lfo.start();
    bgmOscillators.push(oceanOsc, lfo, lfoGain);
  }

  function stopOceanBGM() {
    bgmOscillators.forEach(node => {
      try { node.stop(); node.disconnect(); } catch(e){}
    });
    bgmOscillators = [];
    isBGMPlaying = false;
  }

  window.toggleBGM = function(checked) {
    if (checked) startOceanBGM();
    else stopOceanBGM();
  };

  window.generateRandomLevels = function() {
    for (let i = 0; i < 10; i++) {
      let randomPattern = "";
      const isTwoBars = Math.floor(Math.random() * 2);
      const numBars = isTwoBars === 1 ? 2 : 1;

      for (let bar = 0; bar < numBars; bar++) {
        for (let beat = 0; beat < 4; beat++) {
          randomPattern += notePool[Math.floor(Math.random() * notePool.length)] + " ";
        }
        if (isTwoBars === 1 && bar === 0) {
          randomPattern += "| ";
        }
      }
      gameLevels.push(randomPattern.trim());
    }
    updateLevelList();
    playChord([523, 659, 784, 1047], 0.5, 'triangle');
  };

  window.clearAllLevels = function() {
    if(confirm("確定要清空清單中所有的關卡嗎？")) {
      gameLevels = [];
      updateLevelList();
      playDrum(200, 0.1, false);
    }
  };

  window.addNote = function(note) {
    currentNotes += note + " ";
    document.getElementById("current-pattern").innerText = currentNotes;
    const noteSounds = { '♩': 440, '♫': 554, '𝄽': 330, '|': 880 };
    if (noteSounds[note]) playTone(noteSounds[note], 0.15, note === '|' ? 'square' : 'sine', 0.15);
  };

  window.clearPattern = function() {
    currentNotes = "";
    document.getElementById("current-pattern").innerText = currentNotes;
    playDrum(200, 0.1, false);
  };

  window.addLevel = function() {
    if (currentNotes.trim() === "") { alert("請先輸入音符再加入關卡！"); return; }
    gameLevels.push(currentNotes.trim());
    updateLevelList();
    clearPattern();
    playChord([523, 659, 784], 0.3, 'triangle');
  };

  window.removeLevel = function(index) {
    gameLevels.splice(index, 1);
    updateLevelList();
    playTone(300, 0.2, 'sawtooth', 0.15);
  };

  function updateLevelList() {
    const list = document.getElementById("levels");
    list.innerHTML = "";
    document.getElementById("level-count").innerText = gameLevels.length;
    
    gameLevels.forEach((level, index) => {
      const li = document.createElement("li");
      li.innerHTML = `<span>STAGE ${index + 1}： <span style="color:#00b4db; font-family: monospace;">${level}</span></span> <button class="action-btn btn-red" style="padding: 6px 12px; font-size: 14px;" onclick="removeLevel(${index})">刪除</button>`;
      list.appendChild(li);

  window.startGame = function() {
    if (gameLevels.length === 0) { alert("船長，請至少設定一個關卡才能啟航！"); return; }
    
    document.getElementById("setup-screen").classList.remove("active");
    setTimeout(() => {
      document.getElementById("game-screen").classList.add("active");
    }, 300);

    currentLevelIndex = 0;
    treasures = 0;
    document.getElementById("treasure-count").innerText = "💎 0";

    initAudio();
    if(document.getElementById('bgm-toggle').checked) startOceanBGM();
    
    playTone(392, 0.4, 'square', 0.15, 196);
    setTimeout(() => playTone(196, 0.6, 'square', 0.15, 392), 200);
    setTimeout(() => playChord([392, 523, 659], 0.8, 'triangle'), 500);

    sunLight.color.setHex(0xffffff);
    ambientLight.intensity = 1.0;

    loadLevel();
  };

  window.loadLevel = function() {
    isSinking = false; 
    
    if (shipGroup) {
      shipGroup.position.set(-25, 0, 0); 
      shipGroup.rotation.set(0, 0, 0); 
      shipTargetX = -7; 
    }
    
    if (islandGroup) {
      islandGroup.visible = true;
      const nextColor = islandColors[currentLevelIndex % islandColors.length];
      if (leavesMat) leavesMat.color.setHex(nextColor);
    }
    
    if (treasure) treasure.visible = false;

    document.getElementById("rhythm-display").innerText = gameLevels[currentLevelIndex];
    document.getElementById("game-progress").innerText = `(進度: ${currentLevelIndex + 1} / ${gameLevels.length})`;
    
    const btnCorrect = document.getElementById("next-btn");
    btnCorrect.innerHTML = "🎵 表演正確！";
    btnCorrect.disabled = false;
    btnCorrect.className = "action-btn btn-orange";
    btnCorrect.style.display = "block";

    const btnWrong = document.getElementById("wrong-btn");
    btnWrong.innerHTML = "❌ 表演錯誤";
    btnWrong.disabled = false;
    btnWrong.className = "action-btn btn-red";
    btnWrong.style.display = "block";

    playTone(523, 0.1, 'sine', 0.2);
    setTimeout(() => playTone(659, 0.1, 'sine', 0.2), 120);
  };

  window.performWrong = function() {
    const btnCorrect = document.getElementById("next-btn");
    const btnWrong = document.getElementById("wrong-btn");
    
    if (isSinking) {
        loadLevel();
        return;
    }

    isSinking = true;
    btnCorrect.style.display = "none"; 
    btnWrong.disabled = true;
    btnWrong.innerHTML = "🌊 船隻沉沒中...";
    btnWrong.className = "action-btn btn-gray";

    playTone(150, 0.8, 'sawtooth', 0.4, 40);
    setTimeout(() => playDrum(80, 1.5, true), 200);

    setTimeout(() => {
        btnWrong.innerHTML = "🔄 打撈重新挑戰";
        btnWrong.className = "action-btn btn-blue";
        btnWrong.disabled = false;
    }, 2000);
  };

  window.performCorrect = function() {
    const btnCorrect = document.getElementById("next-btn");
    const btnWrong = document.getElementById("wrong-btn");
    
    btnCorrect.disabled = true;
    btnWrong.style.display = "none"; 
    btnCorrect.innerHTML = "⚓ 航向寶藏...";
    btnCorrect.className = "action-btn btn-gray";

    shipTargetX = 4; // 駛向寶島前方停下

    let beatCount = 0;
    const beatInterval = setInterval(() => {
      if (beatCount < 4) { playDrum(120, 0.15, false); beatCount++; } 
      else { clearInterval(beatInterval); }
    }, 200);

    setTimeout(() => {
      if (islandGroup) islandGroup.visible = false;
      if (treasure) {
        treasure.visible = true;
        treasure.position.y = 0;
        treasure.scale.set(0.1, 0.1, 0.1);
      }
      treasures++;
      document.getElementById("treasure-count").innerText = `💎 ${treasures}`;

      playChord([523, 659, 784, 1047], 0.5, 'sine');
      setTimeout(() => playTone(1319, 0.3, 'sine', 0.2), 200);
      playDrum(800, 0.1, true);

      setTimeout(() => {
          shipTargetX = 25; // 駛離畫面
          if(treasure) treasure.visible = false;
      }, 1200);

    }, 1200); 

    setTimeout(() => {
      currentLevelIndex++;
      if (currentLevelIndex < gameLevels.length) {
        loadLevel();
      } else {
        document.getElementById("game-screen").classList.remove("active");
        setTimeout(() => { document.getElementById("end-screen").classList.add("active"); }, 300);
        
        sunLight.color.setHex(0xffd54f);
        ambientLight.intensity = 0.8;

        playChord([392, 523, 659, 784], 0.6, 'triangle');
        setTimeout(() => playChord([440, 554, 659, 880], 0.6, 'triangle'), 300);
        setTimeout(() => playChord([523, 659, 784, 1047], 1.0, 'triangle'), 600);

        let finalGems = "";
        for (let i = 0; i < treasures; i++) finalGems += "💎 ";
        document.getElementById("final-treasures").innerText = finalGems;
      }
      btnCorrect.disabled = false;
    }, 4500); 
  };

    // 縮放並設定初始位置 (首頁時停靠在畫面外)

  function onWindowResize() {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    if (ocean) {
      const positions = ocean.geometry.attributes.position;
      for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const z = positions.getZ(i);
        const y = Math.sin(x * 0.3 + time) * 0.6 + Math.sin(z * 0.2 + time * 0.8) * 0.4;
        positions.setY(i, y);
      }
      positions.needsUpdate = true;
    }

    if (shipGroup) {
      if (isSinking) {
        shipGroup.position.y -= 0.03;
        shipGroup.rotation.z -= 0.01;
        shipGroup.rotation.x += 0.02;
        if (shipGroup.position.y < -4) shipGroup.position.y = -4; 
      } else {
        shipGroup.position.y = Math.sin(time * 2) * 0.3 + 0.1;
        shipGroup.rotation.z = Math.sin(time * 1.5) * 0.05;
        shipGroup.rotation.x = Math.sin(time * 1.2) * 0.03;

        if (shipGroup.position.x < shipTargetX) {
          shipGroup.position.x += shipSpeed;
          if (shipGroup.position.x > shipTargetX) shipGroup.position.x = shipTargetX;
        }

        // 動態旗幟飄揚特效
        const flagMain = shipGroup.getObjectByName("flag_main");
        if(flagMain) flagMain.rotation.y = Math.sin(time * 15) * 0.3;
        
        const flagFore = shipGroup.getObjectByName("flag_fore");
        if(flagFore) flagFore.rotation.y = Math.sin(time * 18) * 0.3;

        // 動態水花特效 (僅在前進時明顯)
        const isMoving = shipGroup.position.x < shipTargetX;
        for (let i = 0; i < 3; i++) {
            const fR = shipGroup.getObjectByName("foam_R_" + i);
            const fL = shipGroup.getObjectByName("foam_L_" + i);
            const scaleBase = isMoving ? (1 + Math.sin(time * 8 + i) * 0.4) : 0.2;
            if (fR) fR.scale.setScalar(scaleBase);
            if (fL) fL.scale.setScalar(scaleBase);
        }
      }
    }

    if (treasure && treasure.visible) {
      treasure.rotation.y += 0.03;
      treasure.rotation.x += 0.01;
      treasure.position.y = 2.5 + Math.sin(time * 3) * 0.3;
      
      if(treasure.scale.x < 1.5) {
        const s = treasure.scale.x + 0.05;
        treasure.scale.set(s, s, s);
      }
    }

    scene.rotation.y = Math.sin(time * 0.1) * 0.03;

    renderer.render(scene, camera);
  }

  initThree();
  animate();
</script>
</body>
</html>
